<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Portfolio Pessoal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --color-text-primary:#1a1a1a;
  --color-text-secondary:#6b6b6b;
  --color-text-success:#1d7a3c;
  --color-text-danger:#c0392b;
  --color-text-info:#0c447c;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f5f5f4;
  --color-background-success:#e8f5ea;
  --color-background-info:#e6f1fb;
  --color-border-tertiary:#e5e5e3;
  --color-border-secondary:#d4d4d2;
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --color-text-primary:#f0f0f0;
    --color-text-secondary:#a0a0a0;
    --color-text-success:#4ade80;
    --color-text-danger:#f87171;
    --color-text-info:#7cb3f0;
    --color-background-primary:#1a1a1a;
    --color-background-secondary:#262626;
    --color-background-success:#0f2a17;
    --color-background-info:#0f2438;
    --color-border-tertiary:#333331;
    --color-border-secondary:#444442;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary)}
body{padding:0 0 3rem 0}
.container{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
h1{font-size:20px;font-weight:600;margin-bottom:1.25rem}
input,select{
  background:var(--color-background-primary);
  color:var(--color-text-primary);
  border:0.5px solid var(--color-border-secondary);
  border-radius:var(--border-radius-md);
  padding:8px 10px;
  font-family:var(--font-sans);
}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.tabs{display:flex;gap:2px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.5rem;overflow-x:auto}
.tab{padding:8px 16px;font-size:14px;cursor:pointer;border:none;background:none;color:var(--color-text-secondary);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab.active{color:var(--color-text-primary);font-weight:500;border-bottom-color:var(--color-text-primary)}
.tab:hover:not(.active){color:var(--color-text-primary)}
.page{display:none}.page.active{display:block}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem}
.metric-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.metric-delta{font-size:12px;margin-top:2px}
.delta-pos{color:var(--color-text-success)}.delta-neg{color:var(--color-text-danger)}.delta-neu{color:var(--color-text-secondary)}
.section-title{font-size:14px;font-weight:500;color:var(--color-text-secondary);margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:12px}
.account-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.account-row:last-child{border-bottom:none;padding-bottom:0}
.account-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.account-name{flex:1;font-size:14px;color:var(--color-text-primary)}
.account-bank{font-size:12px;color:var(--color-text-secondary)}
.account-val{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:13px;color:var(--color-text-secondary)}
.form-group input,.form-group select{width:100%;font-size:14px}
.form-actions{display:flex;gap:8px;margin-top:1rem;justify-content:flex-end}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border:none;padding:8px 20px;border-radius:var(--border-radius-md);font-size:14px;cursor:pointer}
.btn-ghost{background:none;border:0.5px solid var(--color-border-secondary);padding:8px 16px;border-radius:var(--border-radius-md);font-size:14px;cursor:pointer;color:var(--color-text-primary)}
.type-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.badge-bank{background:#E6F1FB;color:#0C447C}.badge-invest{background:#EAF3DE;color:#27500A}
.badge-crypto{background:#FAEEDA;color:#633806}.badge-imovel{background:#FAECE7;color:#712B13}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--color-text-secondary);font-size:14px}
.month-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.month-nav{display:flex;align-items:center;gap:12px}
.month-nav button{background:none;border:0.5px solid var(--color-border-tertiary);width:28px;height:28px;border-radius:var(--border-radius-md);cursor:pointer;color:var(--color-text-primary);font-size:16px;display:flex;align-items:center;justify-content:center}
.month-label{font-size:15px;font-weight:500;min-width:120px;text-align:center}
.registo-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:8px}
.registo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.registo-total{font-size:13px;color:var(--color-text-secondary)}
.registo-input-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.registo-input-row:last-child{margin-bottom:0}
.registo-name{flex:1;font-size:13px;color:var(--color-text-primary);min-width:140px}
.registo-input{width:140px;font-size:14px;text-align:right}
.save-btn-wrap{margin-top:1rem;display:flex;justify-content:flex-end}
.chart-wrap{position:relative;width:100%;height:280px;margin-bottom:1.5rem}
.no-data-overlay{display:flex;align-items:center;justify-content:center;height:200px;color:var(--color-text-secondary);font-size:14px}
.legend-row{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:8px;font-size:12px;color:var(--color-text-secondary)}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:10px;height:10px;border-radius:2px}
.remove-btn{background:none;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:16px;padding:2px;line-height:1}
.remove-btn:hover{color:var(--color-text-danger)}
.alert{padding:10px 14px;border-radius:var(--border-radius-md);font-size:13px;margin-bottom:1rem}
.alert-success{background:var(--color-background-success);color:var(--color-text-success)}
.alert-info{background:var(--color-background-info);color:var(--color-text-info)}
.top-actions{display:flex;justify-content:flex-end;gap:8px;margin-bottom:1rem}
table{width:100%;font-size:13px;border-collapse:collapse}
th,td{padding:7px 4px}
@media (max-width:600px){
  .form-grid{grid-template-columns:1fr}
  .metric-grid{grid-template-columns:repeat(2,1fr)}
  div[style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important}
}
</style>
</head>
<body>
<div class="container">
<h1>Gestor de Portfolio Pessoal</h1>

<div class="tabs">
  <button class="tab active" onclick="showPage('dashboard',event)"><i class="ti ti-layout-dashboard" aria-hidden="true"></i> Dashboard</button>
  <button class="tab" onclick="showPage('registo',event)"><i class="ti ti-pencil" aria-hidden="true"></i> Registar mês</button>
  <button class="tab" onclick="showPage('contas',event)"><i class="ti ti-building-bank" aria-hidden="true"></i> Contas</button>
  <button class="tab" onclick="showPage('evolucao',event)"><i class="ti ti-chart-line" aria-hidden="true"></i> Evolução</button>
</div>

<div class="top-actions">
  <button class="btn-ghost" onclick="exportarDados()"><i class="ti ti-download" aria-hidden="true"></i> Exportar backup</button>
  <button class="btn-ghost" onclick="document.getElementById('import-file').click()"><i class="ti ti-upload" aria-hidden="true"></i> Importar backup</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importarDados(event)">
</div>

<!-- DASHBOARD -->
<div id="page-dashboard" class="page active">
  <div id="dash-alert" style="display:none"></div>
  <div class="metric-grid" id="dash-metrics"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
    <div>
      <div class="section-title">por tipo</div>
      <div class="chart-wrap" style="height:200px"><canvas id="chart-tipo" role="img" aria-label="Distribuição do portfolio por tipo de ativo"></canvas></div>
    </div>
    <div>
      <div class="section-title">por banco / entidade</div>
      <div class="chart-wrap" style="height:200px"><canvas id="chart-banco" role="img" aria-label="Distribuição do portfolio por banco"></canvas></div>
    </div>
  </div>
  <div class="section-title" style="margin-top:1rem">detalhe — mês atual</div>
  <div id="dash-detalhe"></div>
</div>

<!-- REGISTAR MÊS -->
<div id="page-registo" class="page">
  <div class="month-header">
    <div class="month-nav">
      <button onclick="navMes(-1)" aria-label="Mês anterior"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
      <span class="month-label" id="mes-label"></span>
      <button onclick="navMes(1)" aria-label="Mês seguinte"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
    </div>
    <span id="registo-status" style="font-size:12px;color:var(--color-text-secondary)"></span>
  </div>
  <div id="registo-contas"></div>
  <div class="save-btn-wrap">
    <button class="btn-primary" onclick="guardarRegisto()"><i class="ti ti-device-floppy" aria-hidden="true"></i> Guardar registo</button>
  </div>
</div>

<!-- CONTAS -->
<div id="page-contas" class="page">
  <div id="contas-alert" style="display:none"></div>
  <div class="section-title">adicionar conta</div>
  <div class="card">
    <div class="form-grid">
      <div class="form-group">
        <label for="nova-nome">Nome da conta</label>
        <input type="text" id="nova-nome" placeholder="ex: Conta à ordem">
      </div>
      <div class="form-group">
        <label for="nova-banco">Banco / entidade</label>
        <input type="text" id="nova-banco" placeholder="ex: CGD, Degiro, Binance">
      </div>
      <div class="form-group">
        <label for="nova-tipo">Tipo</label>
        <select id="nova-tipo">
          <option value="bancaria">Conta bancária</option>
          <option value="investimento">Investimento (ações/ETFs/fundos)</option>
          <option value="crypto">Criptomoedas</option>
          <option value="imovel">Imóvel / ativo real</option>
        </select>
      </div>
      <div class="form-group">
        <label for="nova-moeda">Moeda</label>
        <select id="nova-moeda">
          <option value="EUR">EUR €</option>
          <option value="USD">USD $</option>
          <option value="GBP">GBP £</option>
          <option value="BTC">BTC ₿</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="adicionarConta()"><i class="ti ti-plus" aria-hidden="true"></i> Adicionar conta</button>
    </div>
  </div>
  <div class="section-title" style="margin-top:1.5rem">contas registadas</div>
  <div id="lista-contas"></div>
</div>

<!-- EVOLUÇÃO -->
<div id="page-evolucao" class="page">
  <div class="section-title">evolução do patrimônio total</div>
  <div id="evolucao-legend" class="legend-row" style="margin-bottom:8px"></div>
  <div class="chart-wrap"><canvas id="chart-evolucao" role="img" aria-label="Evolução mensal do patrimônio por tipo de ativo"></canvas></div>
  <div class="section-title" style="margin-top:1rem">histórico de registos</div>
  <div id="historico-tabela"></div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const STORAGE_KEY='portfolio_v1';
const TIPOS={bancaria:{label:'Bancária',color:'#378ADD',badge:'badge-bank'},investimento:{label:'Investimento',color:'#639922',badge:'badge-invest'},crypto:{label:'Cripto',color:'#BA7517',badge:'badge-crypto'},imovel:{label:'Imóvel',color:'#D85A30',badge:'badge-imovel'}};
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

let state={contas:[],registos:{}};
let mesAtual=new Date();
mesAtual.setDate(1);
let charts={};

function save(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}
}
function load(){
  try{const d=localStorage.getItem(STORAGE_KEY);if(d)state=JSON.parse(d)}catch(e){}
}
function mesKey(d){return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')}
function mesDisplay(d){return MESES[d.getMonth()]+' '+d.getFullYear()}
function fmt(v,moeda='EUR'){
  const s={EUR:'€',USD:'$',GBP:'£',BTC:'₿'};
  if(moeda==='BTC')return '₿'+parseFloat(v).toFixed(4);
  return parseFloat(v).toLocaleString('pt-PT',{minimumFractionDigits:2,maximumFractionDigits:2})+' '+(s[moeda]||moeda);
}
function totalPortfolio(key){
  const r=state.registos[key];
  if(!r)return null;
  return Object.values(r).reduce((a,v)=>a+parseFloat(v||0),0);
}

function showPage(p,evt){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(evt&&evt.currentTarget)evt.currentTarget.classList.add('active');
  if(p==='dashboard')renderDashboard();
  if(p==='registo')renderRegisto();
  if(p==='contas')renderContas();
  if(p==='evolucao')renderEvolucao();
}

function renderDashboard(){
  const keys=Object.keys(state.registos).sort();
  const lastKey=keys[keys.length-1];
  const prevKey=keys[keys.length-2];
  const lastTotal=lastKey?totalPortfolio(lastKey):0;
  const prevTotal=prevKey?totalPortfolio(prevKey):0;
  const delta=lastTotal-prevTotal;
  const deltaPct=prevTotal>0?((delta/prevTotal)*100):0;

  let alert='';
  const today=new Date();
  if(today.getDate()>=8&&today.getDate()<=12){
    const thisKey=mesKey(today);
    if(!state.registos[thisKey]){
      alert=`<div class="alert alert-info"><i class="ti ti-bell" aria-hidden="true"></i> É altura de registar os valores de ${mesDisplay(today)}!</div>`;
    }
  }
  document.getElementById('dash-alert').innerHTML=alert;
  document.getElementById('dash-alert').style.display=alert?'block':'none';

  const totaisPorTipo={};
  const totaisPorBanco={};
  if(lastKey&&state.registos[lastKey]){
    const r=state.registos[lastKey];
    state.contas.forEach(c=>{
      const v=parseFloat(r[c.id]||0);
      totaisPorTipo[c.tipo]=(totaisPorTipo[c.tipo]||0)+v;
      totaisPorBanco[c.banco]=(totaisPorBanco[c.banco]||0)+v;
    });
  }

  document.getElementById('dash-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">patrimônio total</div><div class="metric-value">${fmt(lastTotal)}</div>
      <div class="metric-delta ${delta>0?'delta-pos':delta<0?'delta-neg':'delta-neu'}">${delta>=0?'▲':'▼'} ${fmt(Math.abs(delta))} (${deltaPct.toFixed(1)}%) vs mês anterior</div>
    </div>
    <div class="metric"><div class="metric-label">bancário</div><div class="metric-value">${fmt(totaisPorTipo.bancaria||0)}</div></div>
    <div class="metric"><div class="metric-label">investimentos</div><div class="metric-value">${fmt(totaisPorTipo.investimento||0)}</div></div>
    <div class="metric"><div class="metric-label">cripto</div><div class="metric-value">${fmt(totaisPorTipo.crypto||0)}</div></div>
    ${totaisPorTipo.imovel?`<div class="metric"><div class="metric-label">imóveis</div><div class="metric-value">${fmt(totaisPorTipo.imovel||0)}</div></div>`:''}
  `;

  destroyChart('chart-tipo');destroyChart('chart-banco');
  const tipoLabels=Object.keys(totaisPorTipo).map(k=>TIPOS[k]?.label||k);
  const tipoVals=Object.values(totaisPorTipo);
  const tipoColors=Object.keys(totaisPorTipo).map(k=>TIPOS[k]?.color||'#888');
  if(tipoVals.length>0){
    charts['chart-tipo']=new Chart(document.getElementById('chart-tipo'),{type:'doughnut',data:{labels:tipoLabels,datasets:[{data:tipoVals,backgroundColor:tipoColors,borderWidth:2,borderColor:'transparent'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}}}});
  }
  const bancoLabels=Object.keys(totaisPorBanco);
  const bancoVals=Object.values(totaisPorBanco);
  const bancoColors=['#378ADD','#639922','#BA7517','#D85A30','#7F77DD','#1D9E75','#D4537E','#888780'];
  if(bancoVals.length>0){
    charts['chart-banco']=new Chart(document.getElementById('chart-banco'),{type:'doughnut',data:{labels:bancoLabels,datasets:[{data:bancoVals,backgroundColor:bancoColors.slice(0,bancoLabels.length),borderWidth:2,borderColor:'transparent'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:10}},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}}}});
  }

  if(!lastKey||!state.contas.length){
    document.getElementById('dash-detalhe').innerHTML='<div class="empty-state"><i class="ti ti-inbox" aria-hidden="true" style="font-size:32px;display:block;margin-bottom:8px"></i>Ainda sem dados. Adiciona contas e regista o primeiro mês.</div>';
    return;
  }
  const r=state.registos[lastKey];
  const bancos={};
  state.contas.forEach(c=>{
    if(!bancos[c.banco])bancos[c.banco]={contas:[],tipo:c.tipo};
    bancos[c.banco].contas.push(c);
  });
  let html='';
  Object.entries(bancos).forEach(([banco,info])=>{
    html+=`<div class="card"><div style="font-weight:500;font-size:14px;margin-bottom:8px">${banco}</div>`;
    info.contas.forEach(c=>{
      const v=parseFloat(r?r[c.id]||0:0);
      html+=`<div class="account-row"><span class="account-dot" style="background:${TIPOS[c.tipo]?.color||'#888'}"></span><div><div class="account-name">${c.nome}</div></div><div><span class="type-badge ${TIPOS[c.tipo]?.badge||''}">${TIPOS[c.tipo]?.label||c.tipo}</span></div><div class="account-val">${fmt(v,c.moeda)}</div></div>`;
    });
    html+='</div>';
  });
  document.getElementById('dash-detalhe').innerHTML=html;
}

function navMes(d){
  mesAtual=new Date(mesAtual.getFullYear(),mesAtual.getMonth()+d,1);
  renderRegisto();
}

function renderRegisto(){
  const key=mesKey(mesAtual);
  document.getElementById('mes-label').textContent=mesDisplay(mesAtual);
  const existing=state.registos[key];
  document.getElementById('registo-status').textContent=existing?'✓ Guardado':'Sem registo';

  if(!state.contas.length){
    document.getElementById('registo-contas').innerHTML='<div class="empty-state"><i class="ti ti-building-bank" style="font-size:28px;display:block;margin-bottom:8px" aria-hidden="true"></i>Começa por adicionar contas no separador <strong>Contas</strong>.</div>';
    return;
  }

  const bancos={};
  state.contas.forEach(c=>{
    if(!bancos[c.banco])bancos[c.banco]=[];
    bancos[c.banco].push(c);
  });

  let html='';
  Object.entries(bancos).forEach(([banco,contas])=>{
    const subtotal=contas.reduce((a,c)=>a+parseFloat(existing?existing[c.id]||0:0),0);
    html+=`<div class="registo-card"><div class="registo-header"><span style="font-weight:500;font-size:14px">${banco}</span><span class="registo-total">${fmt(subtotal)}</span></div>`;
    contas.forEach(c=>{
      const val=existing?existing[c.id]||'':'';
      html+=`<div class="registo-input-row"><span class="account-dot" style="background:${TIPOS[c.tipo]?.color||'#888'}"></span><span class="registo-name">${c.nome} <span class="type-badge ${TIPOS[c.tipo]?.badge||''}">${TIPOS[c.tipo]?.label||''}</span></span><input class="registo-input" type="number" step="0.01" min="0" placeholder="0,00" value="${val}" id="inp-${c.id}" oninput="updateSubtotal('${banco}',this)"></div>`;
    });
    html+='</div>';
  });
  document.getElementById('registo-contas').innerHTML=html;
}

function updateSubtotal(banco,inp){
  const bDiv=inp.closest('.registo-card');
  const inputs=bDiv.querySelectorAll('input');
  let sub=0;inputs.forEach(i=>sub+=parseFloat(i.value||0));
  bDiv.querySelector('.registo-total').textContent=fmt(sub);
}

function guardarRegisto(){
  const key=mesKey(mesAtual);
  const r={};
  state.contas.forEach(c=>{
    const el=document.getElementById('inp-'+c.id);
    if(el)r[c.id]=parseFloat(el.value||0);
  });
  state.registos[key]=r;
  save();
  document.getElementById('registo-status').textContent='✓ Guardado';
  renderRegisto();
}

function adicionarConta(){
  const nome=document.getElementById('nova-nome').value.trim();
  const banco=document.getElementById('nova-banco').value.trim();
  const tipo=document.getElementById('nova-tipo').value;
  const moeda=document.getElementById('nova-moeda').value;
  if(!nome||!banco){
    showAlert('contas','Preenche o nome e o banco / entidade.','info');return;
  }
  const id='c'+Date.now();
  state.contas.push({id,nome,banco,tipo,moeda});
  save();
  document.getElementById('nova-nome').value='';
  document.getElementById('nova-banco').value='';
  showAlert('contas','Conta adicionada com sucesso.','success');
  renderContas();
}

function removerConta(id){
  state.contas=state.contas.filter(c=>c.id!==id);
  save();renderContas();
}

function showAlert(page,msg,type){
  const el=document.getElementById(page+'-alert');
  el.innerHTML=`<div class="alert alert-${type}">${msg}</div>`;
  el.style.display='block';
  setTimeout(()=>{el.style.display='none'},3000);
}

function renderContas(){
  if(!state.contas.length){
    document.getElementById('lista-contas').innerHTML='<div class="empty-state">Ainda sem contas adicionadas.</div>';return;
  }
  const bancos={};
  state.contas.forEach(c=>{
    if(!bancos[c.banco])bancos[c.banco]=[];
    bancos[c.banco].push(c);
  });
  let html='';
  Object.entries(bancos).forEach(([banco,contas])=>{
    html+=`<div class="card"><div style="font-weight:500;font-size:14px;margin-bottom:8px">${banco}</div>`;
    contas.forEach(c=>{
      html+=`<div class="account-row"><span class="account-dot" style="background:${TIPOS[c.tipo]?.color||'#888'}"></span><div class="account-name">${c.nome}<div class="account-bank">${c.moeda}</div></div><span class="type-badge ${TIPOS[c.tipo]?.badge||''}">${TIPOS[c.tipo]?.label||c.tipo}</span><button class="remove-btn" onclick="removerConta('${c.id}')" aria-label="Remover ${c.nome}"><i class="ti ti-trash" aria-hidden="true"></i></button></div>`;
    });
    html+='</div>';
  });
  document.getElementById('lista-contas').innerHTML=html;
}

function renderEvolucao(){
  destroyChart('chart-evolucao');
  const keys=Object.keys(state.registos).sort();
  if(keys.length<1){
    document.getElementById('evolucao-legend').innerHTML='';
    document.getElementById('historico-tabela').innerHTML='<div class="empty-state">Ainda sem registos para mostrar.</div>';
    const c=document.getElementById('chart-evolucao');
    c.parentElement.innerHTML='<div class="no-data-overlay">Ainda sem dados suficientes para o gráfico.</div>';
    return;
  }

  const labels=keys.map(k=>{const[y,m]=k.split('-');return MESES[parseInt(m)-1].slice(0,3)+' '+y.slice(2)});
  const tiposPresentes=[...new Set(state.contas.map(c=>c.tipo))];
  const datasets=tiposPresentes.map(tipo=>{
    return {
      label:TIPOS[tipo]?.label||tipo,
      data:keys.map(k=>{
        const r=state.registos[k];
        if(!r)return 0;
        return state.contas.filter(c=>c.tipo===tipo).reduce((a,c)=>a+parseFloat(r[c.id]||0),0);
      }),
      backgroundColor:TIPOS[tipo]?.color+'33',
      borderColor:TIPOS[tipo]?.color,
      borderWidth:2,
      fill:true,
      tension:0.4,
      pointRadius:4,
      pointBackgroundColor:TIPOS[tipo]?.color
    };
  });
  datasets.push({
    label:'Total',
    data:keys.map(k=>totalPortfolio(k)||0),
    borderColor:'#7F77DD',
    borderWidth:2,
    borderDash:[4,4],
    fill:false,
    tension:0.4,
    pointRadius:3,
    pointBackgroundColor:'#7F77DD',
    backgroundColor:'transparent'
  });

  const legend=document.getElementById('evolucao-legend');
  legend.innerHTML=[...tiposPresentes.map(t=>`<span class="legend-item"><span class="legend-dot" style="background:${TIPOS[t]?.color}"></span>${TIPOS[t]?.label||t}</span>`),`<span class="legend-item"><span class="legend-dot" style="background:#7F77DD;border:1px dashed #7F77DD"></span>Total</span>`].join('');

  const canvas=document.getElementById('chart-evolucao');
  if(!canvas)return;
  charts['chart-evolucao']=new Chart(canvas,{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:ctx=>ctx.dataset.label+': '+fmt(ctx.raw)}}},scales:{x:{grid:{color:'rgba(128,128,128,.1)'},ticks:{font:{size:11},autoSkip:false,maxRotation:45}},y:{grid:{color:'rgba(128,128,128,.1)'},ticks:{callback:v=>v.toLocaleString('pt-PT')+'€',font:{size:11}}}}}});

  let thtml='<div class="card"><table><thead><tr style="border-bottom:0.5px solid var(--color-border-tertiary)"><th style="text-align:left;color:var(--color-text-secondary);font-weight:500">Mês</th>';
  tiposPresentes.forEach(t=>{thtml+=`<th style="text-align:right;color:var(--color-text-secondary);font-weight:500">${TIPOS[t]?.label}</th>`;});
  thtml+='<th style="text-align:right;color:var(--color-text-secondary);font-weight:500">Total</th><th style="text-align:right;color:var(--color-text-secondary);font-weight:500">Δ</th></tr></thead><tbody>';
  const keysRev=[...keys].reverse();
  keysRev.forEach((k,i)=>{
    const total=totalPortfolio(k)||0;
    const prevK=keysRev[i+1];
    const prev=prevK?totalPortfolio(prevK)||0:null;
    const delta=prev!==null?total-prev:null;
    const [y,m]=k.split('-');
    thtml+=`<tr style="border-bottom:0.5px solid var(--color-border-tertiary)"><td>${MESES[parseInt(m)-1]} ${y}</td>`;
    tiposPresentes.forEach(tipo=>{
      const r=state.registos[k];
      const v=r?state.contas.filter(c=>c.tipo===tipo).reduce((a,c)=>a+parseFloat(r[c.id]||0),0):0;
      thtml+=`<td style="text-align:right">${fmt(v)}</td>`;
    });
    thtml+=`<td style="text-align:right;font-weight:500">${fmt(total)}</td><td style="text-align:right;font-size:12px;color:${delta===null?'var(--color-text-secondary)':delta>=0?'var(--color-text-success)':'var(--color-text-danger)'}">${delta===null?'—':(delta>=0?'+':'')+fmt(delta)}</td></tr>`;
  });
  thtml+='</tbody></table></div>';
  document.getElementById('historico-tabela').innerHTML=thtml;
}

function exportarDados(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='portfolio-backup-'+mesKey(new Date())+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importarDados(evt){
  const file=evt.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(data.contas&&data.registos){
        state=data;
        save();
        renderDashboard();renderRegisto();renderContas();renderEvolucao();
        alert('Backup importado com sucesso.');
      }else{
        alert('Ficheiro inválido.');
      }
    }catch(err){
      alert('Erro ao ler o ficheiro: '+err.message);
    }
  };
  reader.readAsText(file);
  evt.target.value='';
}

function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id]}}

load();
renderDashboard();
renderRegisto();
</script>
</body>
</html>
